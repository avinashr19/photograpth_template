# Cloudflare Worker configuration
name = "photograpth_template"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# ── Static Assets (HTML/CSS/JS files) ────────────────────
[assets]
directory = "./public"
binding   = "ASSETS"

# ── KV Binding Note ──────────────────────────────────────
# Attach CONTENT_KV in Cloudflare UI (Settings -> Functions -> KV namespace bindings)
# or specify your real KV ID here if deploying via CLI.

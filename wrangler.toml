# Cloudflare Worker configuration
name = "photograpth_template"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# ── Static Assets (HTML/CSS/JS files) ────────────────────
[assets]
directory = "./public"
binding   = "ASSETS"

# ── KV Namespace (stores site_content JSON & uploads) ────
[[kv_namespaces]]
binding = "CONTENT_KV"
id      = "803a9ef860704f68ab36e70fa002a719"

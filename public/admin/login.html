<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6C63FF;
      --primary-dark: #5a52d5;
      --danger: #FF6B6B;
      --dark: #0d0d1a;
      --dark-2: #13131f;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --text-muted: #8888aa;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    /* Animated background blobs */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(108,99,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(255,107,107,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      width: 100%; max-width: 400px;
      backdrop-filter: blur(20px);
      position: relative; z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center; margin-bottom: 2rem;
    }
    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--primary), #FF6B6B);
      border-radius: 16px; margin: 0 auto 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .logo h1 { font-size: 1.4rem; font-weight: 800; }
    .logo p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; text-transform: uppercase; }
    input {
      width: 100%; padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: rgba(108,99,255,0.6);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1rem; padding: 0.2rem;
    }
    .btn {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; border-radius: 10px;
      color: white; font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 24px rgba(108,99,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 0.5rem;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(108,99,255,0.5); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 8px; padding: 0.7rem 1rem;
      font-size: 0.85rem; color: var(--danger);
      margin-top: 1rem; display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 1.5rem;
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite; vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>Admin Panel</h1>
      <p>Sign in to manage your website</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="toggle-pw">👁</button>
        </div>
      </div>
      <button type="submit" class="btn" id="login-btn">Sign In</button>
      <div class="error-msg" id="error-msg">Invalid username or password.</div>
    </form>

    <a href="/" class="back-link">← Back to website</a>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('admin_token');
    if (token) {
      fetch('/api/auth/verify', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => {
        if (r.ok) window.location.href = '/admin/dashboard.html';
      });
    }

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errMsg = document.getElementById('error-msg');
      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          errMsg.textContent = data.error || 'Invalid credentials.';
          errMsg.style.display = 'block';
        }
      } catch {
        errMsg.textContent = 'Server error. Please try again.';
        errMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
